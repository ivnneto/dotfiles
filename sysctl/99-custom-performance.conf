# =============================================================================
# 99-custom-performance.conf
# Otimizações de kernel para Ubuntu 24.04 LTS
# Testado em: Acer Nitro 5 (i5-12th, 16GB RAM, NVMe SSD)
# Aplicar em: /etc/sysctl.d/99-custom-performance.conf
# Recarregar: sudo sysctl --system
# =============================================================================


# -----------------------------------------------------------------------------
# MEMÓRIA E SWAP
# -----------------------------------------------------------------------------

# Só usa swap quando 90% da RAM tá ocupada (padrão Ubuntu = 60)
# Evita lentidão por swap desnecessário em sistemas com bastante RAM
vm.swappiness=10

# Reduz a pressão pra liberar cache de arquivos da RAM (padrão = 100)
# Mantém mais arquivos em cache, acelerando acesso a arquivos frequentes
vm.vfs_cache_pressure=50

# Percentual máximo de RAM usado pra dados "sujos" aguardando escrita no disco
# Valor menor = flushes menores e mais frequentes (padrão = 20)
vm.dirty_ratio=15

# Percentual de RAM pra iniciar flush em background (padrão = 10)
# Combinado com dirty_ratio, suaviza picos de I/O
vm.dirty_background_ratio=5

# Intervalo entre flushes automáticos em centissegundos (padrão = 500 = 5s)
# 1500 = 15s — reduz escritas desnecessárias no SSD, aumenta vida útil
vm.dirty_writeback_centisecs=1500


# -----------------------------------------------------------------------------
# REDE
# -----------------------------------------------------------------------------

# Tamanho máximo do buffer de recepção de rede (128MB)
# Melhora throughput em conexões de alta velocidade
net.core.rmem_max=134217728

# Tamanho máximo do buffer de envio de rede (128MB)
net.core.wmem_max=134217728

# TCP Fast Open — permite enviar dados no handshake inicial TCP
# 1 = cliente, 2 = servidor, 3 = ambos
# Reduz latência em conexões repetidas
net.ipv4.tcp_fastopen=3

# Algoritmo de controle de congestionamento TCP moderno do Google
# BBR usa modelo de largura de banda em vez de perda de pacotes
# Melhora throughput e latência especialmente em redes com perda
net.ipv4.tcp_congestion_control=bbr

# Disciplina de fila padrão — Fair Queue, necessária pro BBR funcionar bem
net.core.default_qdisc=fq

# Reutiliza sockets em estado TIME_WAIT mais rapidamente
# Útil pra servidores com muitas conexões curtas (APIs, webhooks)
net.ipv4.tcp_tw_reuse=1

# Aumenta o backlog máximo de conexões pendentes (padrão = 128)
# Importante se estiver rodando serviços que recebem muitas conexões simultâneas
net.core.somaxconn=1024
